<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuOnTour Partner Signup</title>
    <!-- 
      NOTE: For production, use a build process (PostCSS/Tailwind CLI). 
      CDN is for preview only.
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#B11226',     /* Primary Actions */
                            black: '#1A1A1A',   /* Headings */
                            dark: '#4B4B4B',    /* Secondary Text */
                            gray: '#E5E7EB',    /* Borders */
                            light: '#F5F5F5',   /* Section Backgrounds */
                            hover: '#8E0E1E',   /* Darker Red for hover */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }

        function toggleVisibility(fieldId, btn) {
            const input = document.getElementById(fieldId);
            const eyeIcon = btn.querySelector('.eye-icon');
            const eyeOffIcon = btn.querySelector('.eye-off-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-brand-black antialiased h-full">

    <!-- Main Layout Container -->
    <div class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
        
        <!-- Auth Card -->
        <div class="w-full max-w-[400px] bg-white rounded-lg border border-brand-gray shadow-sm">
            
            <div class="p-6 sm:p-8">
                <!-- Header / Logo Area -->
                <div class="text-center mb-8">
                    <div class="flex items-center justify-center space-x-2 mb-4">
                         <!-- Logo Image from Assets -->
                         <img src="assets/logo.webp" alt="EuOnTour Logo" class="h-10 w-auto" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                         <!-- Fallback SVG -->
                         <svg class="h-8 w-8 text-brand-red hidden" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                              <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                         </svg>
                    </div>
                    <h1 class="text-xl font-semibold text-brand-black">Create Partner Account</h1>
                    <p class="mt-2 text-sm text-brand-dark">Join our network of travel agencies.</p>
                </div>

                <!-- Signup Form -->
                <form class="space-y-5" onsubmit="event.preventDefault(); window.alert('Signup logic would trigger here.');">
                    
                    <!-- Agency Name -->
                    <div>
                        <label for="agency_name" class="block text-sm font-medium text-brand-black mb-1">
                            Agency Name
                        </label>
                        <div class="relative">
                            <input 
                                id="agency_name" 
                                name="agency_name" 
                                type="text" 
                                required 
                                class="appearance-none block w-full px-3 py-2 border border-brand-gray rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-brand-red focus:border-brand-red sm:text-sm transition-colors duration-200"
                                placeholder="Travel Co. Ltd."
                            >
                        </div>
                        <!-- Inline Validation Error -->
                        <p class="mt-1 text-xs text-red-600 hidden" id="error-agency">Agency name is required.</p>
                    </div>

                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-brand-black mb-1">
                            Email address
                        </label>
                        <div class="relative">
                            <input 
                                id="email" 
                                name="email" 
                                type="email" 
                                autocomplete="email" 
                                required 
                                class="appearance-none block w-full px-3 py-2 border border-brand-gray rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-brand-red focus:border-brand-red sm:text-sm transition-colors duration-200"
                                placeholder="partner@agency.com"
                            >
                        </div>
                        <p class="mt-1 text-xs text-red-600 hidden" id="error-email">Please enter a valid work email.</p>
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-brand-black mb-1">
                            Password
                        </label>
                        <div class="relative">
                            <input 
                                id="password" 
                                name="password" 
                                type="password" 
                                autocomplete="new-password" 
                                required 
                                class="appearance-none block w-full px-3 py-2 border border-brand-gray rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-brand-red focus:border-brand-red sm:text-sm transition-colors duration-200 pr-10"
                                placeholder="••••••••"
                            >
                            <button type="button" onclick="toggleVisibility('password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none" aria-label="Toggle password visibility">
                                <svg class="h-5 w-5 eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <svg class="h-5 w-5 eye-off-icon hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                </svg>
                            </button>
                        </div>
                        <p class="mt-1.5 text-xs text-gray-500">Must be at least 8 characters with 1 number.</p>
                    </div>

                    <!-- Confirm Password Field -->
                    <div>
                        <label for="confirm_password" class="block text-sm font-medium text-brand-black mb-1">
                            Confirm Password
                        </label>
                        <div class="relative">
                            <input 
                                id="confirm_password" 
                                name="confirm_password" 
                                type="password" 
                                autocomplete="new-password" 
                                required 
                                class="appearance-none block w-full px-3 py-2 border border-brand-gray rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-brand-red focus:border-brand-red sm:text-sm transition-colors duration-200 pr-10"
                                placeholder="••••••••"
                            >
                            <!-- Optional: Eye icon for confirm password as well -->
                             <button type="button" onclick="toggleVisibility('confirm_password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none" aria-label="Toggle password visibility">
                                <svg class="h-5 w-5 eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <svg class="h-5 w-5 eye-off-icon hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                </svg>
                            </button>
                        </div>
                        <p class="mt-1 text-xs text-red-600 hidden" id="error-match">Passwords do not match.</p>
                    </div>

                    <!-- Terms Checkbox (Optional but standard for signup) -->
                    <div class="flex items-start">
                        <div class="flex items-center h-5">
                          <input id="terms" name="terms" type="checkbox" required class="focus:ring-brand-red h-4 w-4 text-brand-red border-brand-gray rounded">
                        </div>
                        <div class="ml-2 text-sm">
                          <label for="terms" class="font-medium text-brand-black">I agree to the <a href="#" class="text-brand-red hover:underline">Terms of Service</a></label>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div>
                        <button 
                            type="submit" 
                            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-brand-red hover:bg-brand-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-red transition-colors duration-200"
                        >
                            Create Account
                        </button>
                    </div>
                </form>
            </div>

            <!-- Card Footer -->
            <div class="px-6 py-4 bg-brand-light border-t border-brand-gray rounded-b-lg text-center">
                <p class="text-sm text-brand-dark">
                    Already have an account? 
                    <a href="login.html" class="font-medium text-brand-red hover:text-brand-hover focus:outline-none focus:underline transition ease-in-out duration-150">
                        Log in
                    </a>
                </p>
            </div>
        </div>

        <!-- Footer Copyright -->
        <p class="mt-8 text-center text-xs text-gray-400">
            &copy; 2026 euontour.com. All rights reserved.
        </p>

    </div>

</body>
</html>
