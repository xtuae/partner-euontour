<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuOnTour Reset Password</title>
    <!-- 
      NOTE: For production, use a build process (PostCSS/Tailwind CLI). 
      CDN is for preview only.
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#B11226',     /* Primary Actions */
                            black: '#1A1A1A',   /* Headings */
                            dark: '#4B4B4B',    /* Secondary Text */
                            gray: '#E5E7EB',    /* Borders */
                            light: '#F5F5F5',   /* Section Backgrounds */
                            hover: '#8E0E1E',   /* Darker Red for hover */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-brand-black antialiased h-full">

    <!-- Main Layout Container -->
    <div class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
        
        <!-- Auth Card -->
        <div class="w-full max-w-[400px] bg-white rounded-lg border border-brand-gray shadow-sm">
            
            <div class="p-6 sm:p-8">
                <!-- Header / Logo Area -->
                <div class="text-center mb-8">
                    <div class="flex items-center justify-center space-x-2 mb-4">
                         <!-- Logo Image from Assets -->
                         <img src="assets/logo.webp" alt="EuOnTour Logo" class="h-10 w-auto" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                         <!-- Fallback SVG -->
                         <svg class="h-8 w-8 text-brand-red hidden" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                              <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                         </svg>
                    </div>
                    <h1 class="text-xl font-semibold text-brand-black">Reset Password</h1>
                    <p class="mt-2 text-sm text-brand-dark">Enter your email address and we'll send you a link to reset your password.</p>
                </div>

                <!-- Forgot Password Form -->
                <form class="space-y-6" onsubmit="event.preventDefault(); document.getElementById('success-message').classList.remove('hidden');">
                    
                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-brand-black mb-1">
                            Email address
                        </label>
                        <div class="relative">
                            <input 
                                id="email" 
                                name="email" 
                                type="email" 
                                autocomplete="email" 
                                required 
                                class="appearance-none block w-full px-3 py-2 border border-brand-gray rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-brand-red focus:border-brand-red sm:text-sm transition-colors duration-200"
                                placeholder="partner@agency.com"
                            >
                        </div>
                    </div>

                    <!-- Error Placeholder (Toggle 'hidden' to show) -->
                    <div class="hidden bg-red-50 border border-red-100 text-brand-red px-4 py-3 rounded-lg text-sm flex items-start" role="alert" id="error-message">
                        <svg class="h-5 w-5 mr-2 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span>We couldn't find an account with that email address.</span>
                    </div>

                    <!-- Success Placeholder (Toggle 'hidden' to show) -->
                    <div class="hidden bg-green-50 border border-green-100 text-green-800 px-4 py-3 rounded-lg text-sm flex items-start" role="alert" id="success-message">
                        <svg class="h-5 w-5 mr-2 mt-0.5 flex-shrink-0 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span>If an account exists, a reset link has been sent to your email.</span>
                    </div>

                    <!-- Submit Button -->
                    <div>
                        <button 
                            type="submit" 
                            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-brand-red hover:bg-brand-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-red transition-colors duration-200"
                        >
                            Send Reset Link
                        </button>
                    </div>
                </form>
            </div>

            <!-- Card Footer -->
            <div class="px-6 py-4 bg-brand-light border-t border-brand-gray rounded-b-lg text-center">
                <p class="text-sm text-brand-dark">
                    Remember your password? 
                    <a href="login.html" class="font-medium text-brand-red hover:text-brand-hover focus:outline-none focus:underline transition ease-in-out duration-150">
                        Log in
                    </a>
                </p>
            </div>
        </div>

        <!-- Footer Copyright -->
        <p class="mt-8 text-center text-xs text-gray-400">
            &copy; 2026 euontour.com. All rights reserved.
        </p>

    </div>

</body>
</html>
